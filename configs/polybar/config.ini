; ================================================================
;  Polybar Config — Black & Purple Theme
; ================================================================

; ── Color palette ─────────────────────────────────────────────────
[colors]
bg          = #0a0a0a
bg-alt      = #130020
bg-panel    = #0f0018

fg          = #e2d9f3
fg-dim      = #9b7ec8
fg-muted    = #4a4060

purple      = #9b30ff
purple-mid  = #7b2fbe
purple-dark = #4b0082
purple-glow = #bf5fff
purple-soft = #c084fc

alert       = #ff4466
warn        = #ffaa00
ok          = #50fa7b
disabled    = #3a3050

; ── Bar ───────────────────────────────────────────────────────────
[bar/main]
width            = 100%
height           = 28pt
offset-x         = 0
offset-y         = 0
radius           = 0
fixed-center     = true

background       = ${colors.bg-panel}
foreground       = ${colors.fg}

line-size        = 2pt
line-color       = ${colors.purple}

border-size      = 0
border-bottom-size = 2pt
border-bottom-color = ${colors.purple-dark}

padding-left     = 1
padding-right    = 1
module-margin    = 1

separator        = " "
separator-foreground = ${colors.purple-dark}

; Fonts: 0 = main text, 1 = icons (Font Awesome), 2 = emoji
font-0 = "monospace:size=10;2"
font-1 = "Font Awesome 6 Free:style=Solid:pixelsize=10;2"
font-2 = "Font Awesome 6 Brands:style=Regular:pixelsize=10;2"
font-3 = "Noto Color Emoji:scale=10;2"

modules-left   = xworkspaces xwindow
modules-center = date
modules-right  = cpu memory pulseaudio battery network tray

cursor-click  = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position        = right
tray-padding         = 4
tray-background      = ${colors.bg-panel}
tray-maxsize         = 18

wm-restack = i3

; ── Workspaces ────────────────────────────────────────────────────
[module/xworkspaces]
type = internal/xworkspaces

label-active            = %name%
label-active-background = ${colors.purple-dark}
label-active-foreground = ${colors.fg}
label-active-underline  = ${colors.purple}
label-active-padding    = 1

label-occupied            = %name%
label-occupied-foreground = ${colors.purple-soft}
label-occupied-underline  = ${colors.purple-mid}
label-occupied-padding    = 1

label-urgent            = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = #ffffff
label-urgent-padding    = 1

label-empty             = %name%
label-empty-foreground  = ${colors.disabled}
label-empty-padding     = 1

; ── Active window title ───────────────────────────────────────────
[module/xwindow]
type = internal/xwindow
label            = %title:0:50:…%
label-foreground = ${colors.fg-dim}
label-empty      = " "

; ── Date / time ───────────────────────────────────────────────────
[module/date]
type     = internal/date
interval = 1

date     = %H:%M
date-alt = %a %Y-%m-%d  %H:%M:%S

label            = %{F#bf5fff} %{F-}%date%
label-foreground = ${colors.fg}

; ── CPU ───────────────────────────────────────────────────────────
[module/cpu]
type     = internal/cpu
interval = 2

format-prefix            = " "
format-prefix-foreground = ${colors.purple-glow}
label                    = %percentage:2%%
label-foreground         = ${colors.fg}

; ── Memory ────────────────────────────────────────────────────────
[module/memory]
type     = internal/memory
interval = 3

format-prefix            = " "
format-prefix-foreground = ${colors.purple-glow}
label                    = %percentage_used:2%%
label-foreground         = ${colors.fg}

; ── Volume ────────────────────────────────────────────────────────
[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix            = " "
format-volume-prefix-foreground = ${colors.purple-glow}
format-volume                   = <label-volume>
label-volume                    = %percentage%%
label-volume-foreground         = ${colors.fg}

label-muted            = " muted"
label-muted-foreground = ${colors.fg-muted}

click-right = pavucontrol &

; ── Battery (laptop) ──────────────────────────────────────────────
[module/battery]
type = internal/battery

; Find your battery name with: ls /sys/class/power_supply/
battery = BAT0
adapter = AC0
full-at = 98

format-charging            = <animation-charging> <label-charging>
format-discharging         = <ramp-capacity> <label-discharging>
format-full-prefix         = " "
format-full-prefix-foreground = ${colors.ok}

label-charging            = %percentage%%
label-discharging         = %percentage%%
label-full                = Full
label-full-foreground     = ${colors.ok}

ramp-capacity-0           = ""
ramp-capacity-1           = ""
ramp-capacity-2           = ""
ramp-capacity-3           = ""
ramp-capacity-4           = ""
ramp-capacity-foreground  = ${colors.purple-glow}

animation-charging-0      = ""
animation-charging-1      = ""
animation-charging-2      = ""
animation-charging-3      = ""
animation-charging-4      = ""
animation-charging-foreground = ${colors.purple-glow}
animation-charging-framerate  = 750

; ── Network ───────────────────────────────────────────────────────
[module/network]
type = internal/network

; Change to your interface name (ip a to find it, e.g. wlan0, eno1, eth0)
interface-type = wireless
interval       = 5

format-connected            = <label-connected>
format-disconnected         = <label-disconnected>
format-packetloss           = <animation-packetloss> <label-connected>

label-connected            = " %essid%"
label-connected-foreground = ${colors.purple-glow}

label-disconnected            = " disconnected"
label-disconnected-foreground = ${colors.fg-muted}

animation-packetloss-0           = ""
animation-packetloss-1           = ""
animation-packetloss-foreground  = ${colors.warn}
animation-packetloss-framerate   = 500

; ── Tray ──────────────────────────────────────────────────────────
[module/tray]
type = internal/tray

tray-spacing     = 4
tray-background  = ${colors.bg-panel}
tray-padding     = 2
