# ================================================================
#  hyprlock config — Black & Purple lock screen
# ================================================================

general {
    hide_cursor = true
}

background {
    monitor    =
    color      = rgba(0a0a0aff)
    blur_passes = 2
    blur_size   = 7
    noise       = 0.02
    contrast    = 1.0
    brightness  = 0.5
    vibrancy    = 0.2
}

input-field {
    monitor          =
    size             = 300, 50
    outline_thickness = 2
    dots_size        = 0.25
    dots_spacing     = 0.3
    dots_center      = true
    outer_color      = rgba(9b30ffff)
    inner_color      = rgba(130020ff)
    font_color       = rgba(e2d9f3ff)
    fade_on_empty    = true
    placeholder_text = <span foreground="##9b7ec8"> Password</span>
    hide_input       = false
    position         = 0, -80
    halign           = center
    valign           = center
}

label {
    monitor     =
    text        = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color       = rgba(bf5fffff)
    font_size   = 72
    font_family = monospace Bold
    position    = 0, 200
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = $USER
    color       = rgba(e2d9f3cc)
    font_size   = 16
    font_family = monospace
    position    = 0, 0
    halign      = center
    valign      = center
}
