# ================================================================
#  hyprpaper config — Black & Purple Theme
#  Place your wallpaper at ~/.config/hyprland/wallpaper.jpg
#  or update the path below.
# ================================================================

preload  = ~/.config/hyprland/wallpaper.jpg
wallpaper = , ~/.config/hyprland/wallpaper.jpg

# Fallback: uncomment below for a solid purple-black color
# (requires swaybg as fallback, which hyprpaper doesn't support natively)
# wallpaper = , color:#0a0a0a
