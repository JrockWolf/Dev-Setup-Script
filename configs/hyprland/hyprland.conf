##################################################################
#  Hyprland Config — Black & Purple Theme
#  Deps: waybar, hyprpaper, hypridle, hyprlock, rofi, alacritty,
#        grim, slurp, mako, pactl, playerctl, brightnessctl
##################################################################

# ── Monitor ───────────────────────────────────────────────────────
monitor = , preferred, auto, 1

# ── Wayland environment variables ────────────────────────────────
env = XCURSOR_SIZE, 24
env = QT_QPA_PLATFORM, wayland
env = QT_QPA_PLATFORMTHEME, qt5ct
env = MOZ_ENABLE_WAYLAND, 1
env = SDL_VIDEODRIVER, wayland
env = GDK_BACKEND, wayland,x11

# ── Autostart ─────────────────────────────────────────────────────
exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = hypridle

# ── Input ─────────────────────────────────────────────────────────
input {
    kb_layout    = us
    follow_mouse = 1

    touchpad {
        natural_scroll       = yes
        tap-to-click         = yes
        disable_while_typing = yes
        scroll_factor        = 0.5
    }

    sensitivity   = 0
    accel_profile = flat
}

# ── General ───────────────────────────────────────────────────────
general {
    gaps_in      = 5
    gaps_out     = 8
    border_size  = 2

    col.active_border   = rgba(9b30ffee) rgba(4b0082ee) 45deg
    col.inactive_border = rgba(1e1e2eaa)

    layout       = dwindle
    allow_tearing = false
}

# ── Decoration ────────────────────────────────────────────────────
decoration {
    rounding = 4

    blur {
        enabled   = true
        size      = 6
        passes    = 2
        vibrancy  = 0.17
    }

    drop_shadow           = yes
    shadow_range          = 12
    shadow_render_power   = 3
    col.shadow            = rgba(4b0082cc)
    col.shadow_inactive   = rgba(0a0a0a99)
}

# ── Animations ────────────────────────────────────────────────────
animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.35, 0.95
    bezier = snap,           0.8,  0,    0.2,  1

    animation = windows,     1, 6,  easeOutQuint,   slide
    animation = windowsOut,  1, 4,  easeInOutCubic, slide
    animation = border,      1, 10, easeOutQuint
    animation = fade,        1, 6,  easeOutQuint
    animation = workspaces,  1, 5,  snap,           slide
}

# ── Layouts ───────────────────────────────────────────────────────
dwindle {
    pseudotile      = yes
    preserve_split  = yes
}

master {
    new_is_master = true
}

# ── Gestures (touchpad) ───────────────────────────────────────────
gestures {
    workspace_swipe         = yes
    workspace_swipe_fingers = 3
}

# ── Misc ──────────────────────────────────────────────────────────
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    vrr                      = 0
}

# ── Keybindings ───────────────────────────────────────────────────
$mod = SUPER

# Apps
bind = $mod, Return, exec, alacritty
bind = $mod, D,      exec, rofi -show drun -theme ~/.config/rofi/launcher.rasi
bind = $mod, Tab,    exec, rofi -show window -theme ~/.config/rofi/launcher.rasi

# Window controls
bind = $mod SHIFT, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod SHIFT, R, forcerendererreload

# Lock screen
bind = $mod CTRL, L, exec, hyprlock

# Focus (vim-style + arrows)
bind = $mod, H,     movefocus, l
bind = $mod, J,     movefocus, d
bind = $mod, K,     movefocus, u
bind = $mod, L,     movefocus, r
bind = $mod, left,  movefocus, l
bind = $mod, down,  movefocus, d
bind = $mod, up,    movefocus, u
bind = $mod, right, movefocus, r

# Move windows
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, J,     movewindow, d
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, right, movewindow, r

# Resize submap
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -30 0
binde = , J, resizeactive,   0 30
binde = , K, resizeactive,   0 -30
binde = , L, resizeactive,  30 0
bind  = , Return, submap, reset
bind  = , Escape, submap, reset
submap = reset

# Layouts
bind = $mod,       F,     fullscreen,      0
bind = $mod SHIFT, SPACE, togglefloating
bind = $mod,       P,     pseudo

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Mouse move / resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind  = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind  = , XF86AudioMicMute,     exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind  = , XF86AudioPlay,        exec, playerctl play-pause
bind  = , XF86AudioNext,        exec, playerctl next
bind  = , XF86AudioPrev,        exec, playerctl previous

# Brightness
binde = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Screenshots (grim + slurp)
bind = , Print,       exec, grim "$HOME/Pictures/$(date +%Y%m%d_%H%M%S).png" && notify-send "Screenshot saved"
bind = $mod, Print,   exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" "$HOME/Pictures/$(date +%Y%m%d_%H%M%S).png"
bind = SHIFT, Print,  exec, grim -g "$(slurp)" "$HOME/Pictures/$(date +%Y%m%d_%H%M%S).png"

# ── Window rules ──────────────────────────────────────────────────
windowrulev2 = float,        class:(Pavucontrol)
windowrulev2 = size 700 450, class:(Pavucontrol)
windowrulev2 = float,        class:(lxappearance)
windowrulev2 = size 600 400, class:(lxappearance)
windowrulev2 = float,        title:(Picture-in-Picture)
windowrulev2 = pin,          title:(Picture-in-Picture)
