# ================================================================
#  Picom Config — Black & Purple Theme
#  Compositor: transparency, shadows, rounded corners, fading
# ================================================================

# ── Shadows ───────────────────────────────────────────────────────
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.75;
shadow-offset-x = -8;
shadow-offset-y = -8;
# Purple-tinted shadow
shadow-color = "#2b0060";

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'i3bar'",
    "class_g = 'polybar'"
];

# ── Fading ────────────────────────────────────────────────────────
fading = true;
fade-in-step  = 0.04;
fade-out-step = 0.04;
fade-delta    = 5;

fade-exclude = [];

# ── Transparency / opacity ────────────────────────────────────────
inactive-opacity       = 0.92;
active-opacity         = 1.0;
frame-opacity          = 0.9;
inactive-opacity-override = false;

opacity-rule = [
    "100:class_g = 'firefox'",
    "100:class_g = 'brave-browser'",
    "100:class_g = 'obs'",
    "95:class_g  = 'Code'",
    "95:class_g  = 'discord'",
    "90:class_g  = 'Alacritty'",
    "90:class_g  = 'kitty'",
    "90:class_g  = 'URxvt'",
    "90:class_g  = 'XTerm'"
];

# ── Blur ──────────────────────────────────────────────────────────
blur-background = true;
blur-method     = "dual_kawase";
blur-strength   = 5;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Rounded corners ───────────────────────────────────────────────
corner-radius = 8;
round-borders = 1;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ── Backend ───────────────────────────────────────────────────────
backend = "glx";
vsync = true;

# ── Window type settings ──────────────────────────────────────────
wintypes:
{
    tooltip      = { fade = true; shadow = false; opacity = 0.95; focus = true; full-shadow = false; };
    dock         = { shadow = false; clip-shadow-above = true; };
    dnd          = { shadow = false; };
    popup_menu   = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};
